version: '3.9'

services:
  # ── MongoDB ────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: auction_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: auctiondb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - auction_network

  # ── Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: production
    container_name: auction_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/auctiondb
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production_min_32_chars_long}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - auction_network

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
    container_name: auction_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auction_network

volumes:
  mongo_data:
    driver: local

networks:
  auction_network:
    driver: bridge
